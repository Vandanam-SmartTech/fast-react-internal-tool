name: Build & Deploy React App (Dev)

on:
  push:
    branches: [ dev ]   # trigger only on dev branch
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Debug - Show build output
        run: ls -R build || echo "⚠️ Build folder missing!"

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy React app to server
        run: |
          # Ensure target directory exists
          ssh -p 6022 -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "sudo mkdir -p /var/www/dev/solarpro"

          # Remove old files
          ssh -p 6022 -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "sudo rm -rf /var/www/dev/solarpro/*"

          # Copy new build files
          scp -P 6022 -r -o StrictHostKeyChecking=no ./build/* \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/dev/solarpro/

          # Reload nginx
          ssh -p 6022 -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "sudo systemctl reload nginx"
