name: Deploy SolarPro Dev

on:
  push:
    branches:
      - dev   # Trigger only on dev branch

jobs:
  build-and-deploy:
    if: contains(github.event.head_commit.message, 'push-dev')   # ✅ Run only if commit msg has 'push-dev'
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build React+Vite
      - name: Build project
        run: npm run build

      # 5. Setup SSH agent
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      # 6. Deploy dist to server
      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p /opt/solarpro-frontend/dev/current"
          scp -r dist/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/solarpro-frontend/dev/current/
