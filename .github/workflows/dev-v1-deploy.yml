name: Build & Deploy React App (Dev)

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    if: contains(github.event.head_commit.message, 'push-dev')   # ✅ Only run when commit msg contains 'deploy-dev'
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci
        working-directory: ./   # 👈 adjust if frontend is in subfolder

      # 4. Build Vite app
      - name: Build Vite app
        run: npm run build
        working-directory: ./   # 👈 adjust if needed

      # 5. Debug build output
      - name: Debug - Show dist output
        run: ls -R ./dist || echo "⚠️ Dist folder missing!"
        working-directory: ./   # 👈 adjust if needed

      # 6. Start SSH agent
      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      # 7. Deploy build to server
      - name: Deploy Vite app to server
        run: |
          ssh -p 6022 -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "sudo mkdir -p /var/www/dev/solarpro && sudo rm -rf /var/www/dev/solarpro/*"
          scp -P 6022 -r -o StrictHostKeyChecking=no ./dist/* \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/dev/solarpro/
          ssh -p 6022 -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "sudo systemctl reload nginx"
